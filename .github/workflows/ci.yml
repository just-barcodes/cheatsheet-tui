name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Installs the exact toolchain pinned in .mise.toml (go, task) and
      # trusts the config, so CI runs in the same isolated env as local dev.
      - uses: jdx/mise-action@v4

      # .mise.toml redirects GOMODCACHE/GOCACHE into .go/, so caching that
      # one directory covers both modules and build cache.
      - uses: actions/cache@v5
        with:
          path: .go
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      # Same gate as local: gofmt check, vet, all tests (BDD + unit), build.
      - run: task ci

      # Run the pre-commit hook checks over the whole tree, so commits made
      # with --no-verify (or from machines without hooks) are still caught.
      - run: lefthook run pre-commit --all-files
